<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - TikTok Promo ET</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        /* Premium Checkmark Animation */
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2.5;
            stroke: var(--success);
            stroke-miterlimit: 10;
            margin: 0 auto 1.5rem;
            box-shadow: inset 0px 0px 0px var(--success);
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2.5;
            stroke-miterlimit: 10;
            stroke: var(--success);
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: white;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px var(--success); } }

        h2 { color: var(--text-main); margin: 0 0 0.5rem; font-weight: 700; }
        p { color: var(--text-sub); font-size: 1rem; line-height: 1.5; }

        /* Modern Spinner */
        .loader-container {
            height: 30px;
            margin-top: 1.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .manual-btn {
            display: none;
            margin-top: 1.5rem;
            text-decoration: none;
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .manual-btn:active { transform: scale(0.95); }
        
        .app-icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }
        
        .app-name {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <span class="app-icon">📱</span>
    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>
    
    <h2>Payment Success!</h2>
    <p id="status-text">Finalizing your transaction...</p>
    
    <div class="loader-container" id="loader-box">
        <div class="spinner"></div>
    </div>
    
    <a href="#" id="manual-btn" class="manual-btn">📱 Return to TikTok Promo ET</a>
</div>

<script>
    // ✅ Change this to your TikTok Promo ET package name
    const PACKAGE_NAME = "com.example.tiktok_promo_et";
    
    // ✅ Change scheme to match TikTok Promo ET
    const APP_SCHEME = "tiktokpromo";
    
    // ✅ Get transaction reference from URL
    const urlParams = new URLSearchParams(window.location.search);
    const txRef = urlParams.get('tx_ref') || '';
    const amount = urlParams.get('amount') || '';
    
    // ✅ Build deep link with transaction data
    const DEEP_LINK = `${APP_SCHEME}://payment/success?tx_ref=${txRef}&amount=${amount}`;
    
    // ✅ Android Intent URL
    const REDIRECT_URL = `intent://payment-success?tx_ref=${txRef}&amount=${amount}#Intent;scheme=${APP_SCHEME};package=${PACKAGE_NAME};S.browser_fallback_url=https://tiktokpromo.et/payment/success;end`;
    
    // ✅ iOS Universal Link / Fallback
    const FALLBACK_URL = `https://tiktokpromo.et/payment/success?tx_ref=${txRef}&amount=${amount}`;
    
    window.onload = function() {
        // Step 1: Show animation
        setTimeout(() => {
            document.getElementById('status-text').innerHTML = `Opening <span class="app-name">TikTok Promo ET</span>...`;
            
            // Step 2: Try multiple methods to open the app
            
            // Method 1: Android Intent (Android Chrome)
            try {
                window.location.replace(REDIRECT_URL);
            } catch(e) {
                console.log('Intent failed:', e);
            }
            
            // Method 2: Universal Link (iOS)
            try {
                window.location.href = DEEP_LINK;
            } catch(e) {
                console.log('Deep link failed:', e);
            }
            
            // Method 3: Fallback after 3 seconds
            setTimeout(() => {
                // Try fallback URL
                window.location.href = FALLBACK_URL;
            }, 3000);
            
            // Show manual button if user is still here after 5 seconds
            setTimeout(() => {
                document.getElementById('status-text').innerHTML = `Almost there! If <span class="app-name">TikTok Promo ET</span> didn't open, click below.`;
                document.getElementById('loader-box').style.display = "none";
                const btn = document.getElementById('manual-btn');
                btn.style.display = "inline-block";
                btn.href = DEEP_LINK;
                btn.onclick = function(e) {
                    e.preventDefault();
                    window.location.href = DEEP_LINK;
                    // Fallback
                    setTimeout(() => {
                        window.location.href = FALLBACK_URL;
                    }, 2000);
                };
            }, 5000);
            
        }, 2000);
    };
    
    // ✅ Check if app is installed (Android)
    function isAppInstalled() {
        // This is a simple check - in production use more robust method
        return true;
    }
</script>

</body>
</html>
