<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        /* Premium Checkmark Animation */
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2.5;
            stroke: var(--success);
            stroke-miterlimit: 10;
            margin: 0 auto 1.5rem;
            box-shadow: inset 0px 0px 0px var(--success);
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2.5;
            stroke-miterlimit: 10;
            stroke: var(--success);
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: white; /* Contrast against the filled green circle */
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px var(--success); } }

        h2 { color: var(--text-main); margin: 0 0 0.5rem; font-weight: 700; }
        p { color: var(--text-sub); font-size: 1rem; line-height: 1.5; }

        /* Modern Spinner */
        .loader-container {
            height: 30px;
            margin-top: 1.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .manual-btn {
            display: none;
            margin-top: 1.5rem;
            text-decoration: none;
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .manual-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="card">
    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>
    
    <h2>Payment Success!</h2>
    <p id="status-text">Finalizing your appointment...</p>
    
    <div class="loader-container" id="loader-box">
        <div class="spinner"></div>
    </div>
    
    <a href="#" id="manual-btn" class="manual-btn">Return to Tenachin</a>
</div>

<script>
    const PACKAGE_NAME = "com.example.tiktok_promo_et";
    // This intent includes a S.browser_fallback_url to prevent dead ends
    const REDIRECT_URL = `intent://payment-success#Intent;scheme=finotetena;package=${PACKAGE_NAME};S.browser_fallback_url=https://tenachin.page.link/success;end`;
    
    window.onload = function() {
        // Step 1: Show animation
        setTimeout(() => {
            document.getElementById('status-text').innerText = "Opening Tenachin app...";
            
            // Step 2: Attempt auto-redirect
            window.location.replace(REDIRECT_URL);

            // Step 3: Show manual button if the user is still on this page after 3 seconds
            setTimeout(() => {
                document.getElementById('status-text').innerText = "Almost there! If the app didn't open, click below.";
                document.getElementById('loader-box').style.display = "none";
                const btn = document.getElementById('manual-btn');
                btn.style.display = "inline-block";
                btn.href = REDIRECT_URL;
            }, 3000);
        }, 2000);
    };
</script>

</body>
</html>
